# ============================================================================
# Cross-modal attention experiment — master configuration
# ----------------------------------------------------------------------------
# Both scripts read everything from this file:
#   * build_stimuli.py  — prepares the stimulus library ONCE (downloads audio +
#                         word onsets into stims/, writes stims/manifest.json).
#   * run_block.py      — runs one experimental block using the prepared library
#                         and logs behaviour into behavior/.
# Edit values here rather than touching the code.
# ============================================================================

paths:
  stim_dir: stims                 # prepared/downloaded stimuli (SHARED library)
  audio_subdir: audio             # -> stims/audio/<id>.wav + <id>.words.json/csv
  manifest: stims/manifest.json   # index of every prepared stimulus
  # Per-session outputs. `run.py` organises them under data/<subject>/<session>/;
  # these plain defaults are used only when running run_block.py directly.
  data_root: data                 # root of per-subject / per-session output
  behavior_dir: behavior
  games_dir: games

# ---------------------------------------------------------------------------
# Stimulus library builder (build_stimuli.py). Run once; reuse every session.
# `--add` appends new clips without touching existing ones.
# ---------------------------------------------------------------------------
build:
  source: librispeech             # librispeech | tts
  n_clips: 10                     # number of audio stimuli to prepare
  target_duration_s: 28.0         # concatenate utterances up to ~this length
  max_duration_s: 32.0            # never exceed this per prepared clip
  seed: 1234                      # reproducible selection

  librispeech:
    dataset: gilkeyio/librispeech-alignments   # audio + MFA word onsets (CC-BY-4.0)
    split: dev_clean              # dev_clean | dev_other | test_clean | test_other
    same_speaker_per_clip: true   # concatenate utterances from a single speaker
    inter_utterance_gap_s: 0.30   # silence inserted between concatenated utts
    scan_limit: 4000              # max rows to stream while searching for clips

  tts:                            # only used when build.source == tts
    engine: gtts                  # gtts (online) | pyttsx3 (offline, macOS voice)
    whisper_model: small.en       # local faster-whisper model for word onsets
    texts: []                     # optional explicit paragraphs; auto-filled if empty

# ---------------------------------------------------------------------------
# Experiment presentation (run_block.py)
# ---------------------------------------------------------------------------
experiment:
  fullscreen: true
  bg_color: black
  text_color: white
  audio_lib: [ptb, sounddevice, pyo]   # PTB first for schedulable, low-latency audio
  fallback_refresh_hz: 60.0            # used only if the refresh rate can't be measured

  # FIXED master seed -> the whole session is reproducible (audio assignment,
  # focus order, delay jitter, and every Tetris game). Recorded in every log.
  # Override for a specific run with `--seed`. Keep constant for a fixed design.
  seed: 20240601

  n_trials: 60                    # trials run back-to-back in one session
  inter_trial_interval_s: 0.8     # blank fixation between trials
  gap_seconds: 2.0                # BASE fixation delay before each block (this is
                                  # jittered per trial; see `jitter` below)
  block_seconds: 20.0             # audiovisual block length per trial
  block_mode: fixed               # fixed = every block is exactly block_seconds;
                                  # audio = run for the clip's length (capped)

  # Trial-to-trial timing jitter ADDED to the delay (gap) above, to decorrelate
  # stimulus onsets for EEG. Gaussian with std_ms, clamped to +/- max_ms. The
  # actual per-trial delay, jitter, and instruction/cue length are logged.
  jitter:
    enabled: true
    std_ms: 150                   # Gaussian standard deviation of the jitter
    max_ms: 300                   # clamp the jitter to +/- this many milliseconds

  # Attentional focus per trial:
  #   auto   (default) = the experiment assigns focus, balanced 50/50 and
  #                      shuffled, and CUES the subject ("Attend to the AUDIO").
  #   manual           = the subject chooses each trial (LEFT=Audio/RIGHT=Visual).
  focus_mode: auto
  cue_seconds: 1.5                # auto-mode cue length WHEN start_on_space is false
  start_on_space: false           # false = the cue auto-advances after cue_seconds
                                  #         (no key press needed to start a trial)
                                  # true  = the cue waits for SPACE (self-paced)
  # Focus cue layout: a small "attend to" line above a big "AUDIO" / "VISUAL".
  cue_prefix_text: "attend to"
  cue_prefix_height: 0.05         # height (height units) of the small prefix line
  cue_word_height: 0.20           # height of the big AUDIO / VISUAL word

# ---------------------------------------------------------------------------
# Attention-check probe (shown after the block). Format: yes / no.
# ---------------------------------------------------------------------------
probe:
  format: yes_no
  keys:
    "yes": right                  # on-screen prompt: YES  (->)
    "no": left                    # on-screen prompt: NO   (<-)
  quit_key: escape
  instruction: "Did this happen in the stream you were attending to?"

  audio:
    # Auto-generated per clip by the builder: a "was WORD spoken?" probe.
    # Each clip stores BOTH a TRUE-target variant (a content word taken from the
    # transcript) and a FALSE-target variant (a common word absent from it). The
    # runner picks one at random per trial, so the correct answer is balanced.
    strategy: word_present
    min_word_len: 4               # only use content words at least this long

# ---------------------------------------------------------------------------
# Visual stimulus.
#
# DEFAULT = `tetris`: a self-playing, black-and-white Tetris (implemented in
# tetris/), watched PASSIVELY. It is deterministic (seeded per trial), grayscale
# (no colour confound), centred with a fixation dot, and cleared rows FLASH — the
# attend-visual task is to COUNT those flashes, scored automatically against the
# known count. This replaces the pre-recorded video (no non-game sections, no
# random-cut machinery needed).
#
# Alternatives: `gabor` (rotating patch, count reversals) or `video` (the
# pre-recorded tetris.mp4 with random cuts; see build_video_segments.py).
# ---------------------------------------------------------------------------
visual:
  mode: tetris                    # tetris | gabor | video

  tetris:
    cols: 10                      # board width in cells
    rows: 20                      # board height in cells
    board_height: 0.5             # on-screen board height (height units); width
                                  # follows from cols/rows (compact + centred)
    speed_s_per_step: 0.045       # GAME SPEED: seconds per move/gravity step
                                  # (smaller = faster). ~0.045 -> ~1 piece/second.
    flash_s: 0.18                 # how long cleared rows flash before disappearing
    render_cell_px: 14            # pixels per cell (on-screen texture + mp4 size)
    show_fixation: true           # central fixation dot (maintain fixation)
    flip_vertical: true           # PsychoPy shows numpy row 0 at the bottom; keep
                                  # true so the stack renders at the bottom
    seed_base: 0                  # combined with the master seed + trial index
    probe_question: "What was the GREATEST height the stack reached (number of rows)?"

  gabor:
    size: 0.26                    # patch diameter in height units (kept small)
    cycles: 3.0                   # number of grating cycles across the patch
    contrast: 1.0
    rotation_speed_dps: 75.0      # rotation speed, degrees per second
    switch_min_interval_s: 1.2    # random reversal every [min, max] seconds
    switch_max_interval_s: 3.5
    show_fixation: true           # small central fixation dot
    probe_question: "How many times did the grating reverse its rotation direction?"

  video:
    file: stim_files/tetris.mp4
    scale: 1.8                    # on-screen size, multiple of native pixels
    random_start: true            # each trial seeks to a RANDOM offset -> a
                                  # different ~block_seconds cut of the clip
    min_gap_from_end_s: 0.5       # keep the random cut this far from the end

    # Random cuts are drawn ONLY from valid black-and-white GAME segments listed
    # in this file (produced by build_video_segments.py). If the file is missing
    # the runner falls back to cutting from the whole clip.
    segments_file: stims/video/tetris_segments.json
    filter:                       # parameters for build_video_segments.py
      sample_interval_s: 0.20     # analyse one frame every N seconds
      saturation_threshold: 12    # mean HSV saturation < this  ->  grayscale (game)
      min_segment_s: 20.0         # keep grayscale runs at least this long (>= block)
      merge_gap_s: 0.6            # bridge colour blips shorter than this
    probes:                       # yes/no game probes; set each `correct` yourself
      - id: score_threshold
        question: "Did the score go above 10,000 points?"
        correct: null             # <-- REQUIRED for video mode: set true or false
      - id: top_stack
        question: "Did any block stack reach the very top of the playfield?"
        correct: null             # <-- REQUIRED for video mode: set true or false
    labels:                       # optional, for your own records
      final_score: null
      max_stack_rows: null

# ---------------------------------------------------------------------------
# Webcam monitoring (optional). Recorded in a SEPARATE process so it never
# perturbs the PsychoPy draw-loop timing. Saved under webcam/ together with a
# per-frame wall-clock timestamp sidecar (<name>.frames.csv) and a status file,
# so each frame can be aligned to the logged AV-onset wall-clock.
# macOS: grant camera access to your terminal/Python under
#        System Settings > Privacy & Security > Camera.
# ---------------------------------------------------------------------------
webcam:
  enabled: true
  dir: webcam                     # recordings saved here (git-ignored)
  device: 0                       # capture device index
  fps: 0                          # 0 = use the camera's reported rate
  resolution: [640, 480]          # [width, height]; null = camera default
  fourcc: mp4v                    # OpenCV codec; mp4v -> .mp4 works on macOS
  container: mp4                  # output file extension
  required: false                 # true = abort the block if the camera won't open
  max_seconds: 600                # safety cap on a single recording

# ---------------------------------------------------------------------------
# Photodiode trigger square. A solid square is shown in the bottom-right corner
# for the whole 1-second gap: its RISING edge marks the gap onset and its
# FALLING edge marks the audiovisual onset (gap end), so a photodiode taped to
# that corner gives hardware-precise timing for the EEG.
# ---------------------------------------------------------------------------
trigger:
  enabled: true
  size_px: 100                    # square side length in pixels
  color: white                    # square colour (on black background)
  corner: bottom-right            # bottom-right | bottom-left | top-right | top-left

