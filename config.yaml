# ============================================================================
# Cross-modal attention experiment — master configuration
# ----------------------------------------------------------------------------
# Both scripts read everything from this file:
#   * build_stimuli.py  — prepares the stimulus library ONCE (downloads audio +
#                         word onsets into stims/, writes stims/manifest.json).
#   * run_block.py      — runs one experimental block using the prepared library
#                         and logs behaviour into behavior/.
# Edit values here rather than touching the code.
# ============================================================================

paths:
  stim_dir: stims                 # prepared/downloaded stimuli live here
  audio_subdir: audio             # -> stims/audio/<id>.wav + <id>.words.json/csv
  behavior_dir: behavior          # per-subject behavioural logs
  manifest: stims/manifest.json   # index of every prepared stimulus

# ---------------------------------------------------------------------------
# Stimulus library builder (build_stimuli.py). Run once; reuse every session.
# `--add` appends new clips without touching existing ones.
# ---------------------------------------------------------------------------
build:
  source: librispeech             # librispeech | tts
  n_clips: 10                     # number of audio stimuli to prepare
  target_duration_s: 28.0         # concatenate utterances up to ~this length
  max_duration_s: 32.0            # never exceed this per prepared clip
  seed: 1234                      # reproducible selection

  librispeech:
    dataset: gilkeyio/librispeech-alignments   # audio + MFA word onsets (CC-BY-4.0)
    split: dev_clean              # dev_clean | dev_other | test_clean | test_other
    same_speaker_per_clip: true   # concatenate utterances from a single speaker
    inter_utterance_gap_s: 0.30   # silence inserted between concatenated utts
    scan_limit: 4000              # max rows to stream while searching for clips

  tts:                            # only used when build.source == tts
    engine: gtts                  # gtts (online) | pyttsx3 (offline, macOS voice)
    whisper_model: small.en       # local faster-whisper model for word onsets
    texts: []                     # optional explicit paragraphs; auto-filled if empty

# ---------------------------------------------------------------------------
# Experiment presentation (run_block.py)
# ---------------------------------------------------------------------------
experiment:
  fullscreen: true
  bg_color: black
  text_color: white
  audio_lib: [ptb, sounddevice, pyo]   # PTB first for schedulable, low-latency audio
  fallback_refresh_hz: 60.0            # used only if the refresh rate can't be measured

  gap_seconds: 1.0                # frame-counted fixation buffer before the block
  block_seconds: 30.0             # hard cap on audiovisual playback
  block_mode: audio               # audio = run for the clip's length (capped);
                                  # fixed = always run the full block_seconds

# ---------------------------------------------------------------------------
# Attention-check probe (shown after the block). Format: yes / no.
# ---------------------------------------------------------------------------
probe:
  format: yes_no
  keys:
    "yes": right                  # on-screen prompt: YES  (->)
    "no": left                    # on-screen prompt: NO   (<-)
  quit_key: escape
  instruction: "Did this happen in the stream you were attending to?"

  audio:
    # Auto-generated per clip by the builder: a "was WORD spoken?" probe.
    # Each clip stores BOTH a TRUE-target variant (a content word taken from the
    # transcript) and a FALSE-target variant (a common word absent from it). The
    # runner picks one at random per trial, so the correct answer is balanced.
    strategy: word_present
    min_word_len: 4               # only use content words at least this long

# ---------------------------------------------------------------------------
# Visual stimulus.
#
# DEFAULT = a small, CENTRED Gabor patch that rotates and randomly REVERSES its
# rotation direction. The attend-visual task is to COUNT the reversals. Because
# the patch stays at fixation, this avoids the eye-movement (pursuit/saccade)
# confound of a moving gameplay video. The reversal schedule is generated by the
# experiment, so the true count is known exactly and the count probe is scored
# automatically.
#
# Set visual.mode: video to use the tetris clip instead (yes/no game probes;
# you must then fill in each probe's `correct:` after watching the clip).
# ---------------------------------------------------------------------------
visual:
  mode: gabor                     # gabor | video

  gabor:
    size: 0.16                    # patch diameter in height units (kept small)
    cycles: 6.0                   # number of grating cycles across the patch
    contrast: 1.0
    rotation_speed_dps: 75.0      # rotation speed, degrees per second
    switch_min_interval_s: 1.2    # random reversal every [min, max] seconds
    switch_max_interval_s: 3.5
    show_fixation: true           # small central fixation dot
    probe_question: "How many times did the grating reverse its rotation direction?"

  video:
    file: stim_files/tetris.mp4
    scale: 1.8                    # on-screen size, multiple of native pixels
    probes:                       # yes/no game probes; set each `correct` yourself
      - id: score_threshold
        question: "Did the score go above 10,000 points?"
        correct: null             # <-- REQUIRED for video mode: set true or false
      - id: top_stack
        question: "Did any block stack reach the very top of the playfield?"
        correct: null             # <-- REQUIRED for video mode: set true or false
    labels:                       # optional, for your own records
      final_score: null
      max_stack_rows: null

# ---------------------------------------------------------------------------
# Webcam monitoring (optional). Recorded in a SEPARATE process so it never
# perturbs the PsychoPy draw-loop timing. Saved under webcam/ together with a
# per-frame wall-clock timestamp sidecar (<name>.frames.csv) and a status file,
# so each frame can be aligned to the logged AV-onset wall-clock.
# macOS: grant camera access to your terminal/Python under
#        System Settings > Privacy & Security > Camera.
# ---------------------------------------------------------------------------
webcam:
  enabled: true
  dir: webcam                     # recordings saved here (git-ignored)
  device: 0                       # capture device index
  fps: 0                          # 0 = use the camera's reported rate
  resolution: [640, 480]          # [width, height]; null = camera default
  fourcc: mp4v                    # OpenCV codec; mp4v -> .mp4 works on macOS
  container: mp4                  # output file extension
  required: false                 # true = abort the block if the camera won't open
  max_seconds: 600                # safety cap on a single recording

